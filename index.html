<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel's Nightly Quotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Night palette (default) */
      --c-a: #7c3aed;
      --c-b: #1d4ed8;
      --c-glow: rgba(124, 58, 237, 0.35);
      --c-glow2: rgba(29, 78, 216, 0.25);
      --c-accent: #a78bfa;
      --c-accent2: #60a5fa;
      --c-glass-border: rgba(167, 139, 250, 0.18);
      --c-glass-bg: rgba(10, 5, 30, 0.55);
      --c-orb1: radial-gradient(ellipse at 40% 50%, rgba(124,58,237,0.55) 0%, rgba(29,78,216,0.3) 50%, transparent 80%);
      --c-orb2: radial-gradient(ellipse at 65% 45%, rgba(29,78,216,0.4) 0%, transparent 65%);
      --bg: #050410;
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(200, 190, 255, 0.65);
      --text-dim: rgba(180, 170, 240, 0.4);
      --badge-bg: rgba(124, 58, 237, 0.2);
      --badge-border: rgba(167, 139, 250, 0.3);
      --scrollbar: rgba(124, 58, 237, 0.3);
    }

    body.morning {
      --c-a: #f97316;
      --c-b: #eab308;
      --c-glow: rgba(249, 115, 22, 0.35);
      --c-glow2: rgba(234, 179, 8, 0.25);
      --c-accent: #fb923c;
      --c-accent2: #fbbf24;
      --c-glass-border: rgba(251, 146, 60, 0.2);
      --c-glass-bg: rgba(20, 10, 0, 0.55);
      --c-orb1: radial-gradient(ellipse at 40% 50%, rgba(249,115,22,0.55) 0%, rgba(234,179,8,0.3) 50%, transparent 80%);
      --c-orb2: radial-gradient(ellipse at 65% 45%, rgba(234,179,8,0.4) 0%, transparent 65%);
      --bg: #0d0802;
      --text-primary: rgba(255, 248, 235, 0.95);
      --text-secondary: rgba(255, 220, 150, 0.65);
      --text-dim: rgba(255, 200, 100, 0.4);
      --badge-bg: rgba(249, 115, 22, 0.2);
      --badge-border: rgba(251, 146, 60, 0.3);
      --scrollbar: rgba(249, 115, 22, 0.3);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: background 1.2s ease, color 0.8s ease;
      overflow-x: hidden;
    }

    /* ── Ambient background ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      transition: background 1.4s ease, transform 12s ease-in-out;
    }
    .orb-1 {
      width: 70vw; height: 70vw;
      top: -20vw; left: -15vw;
      background: var(--c-a);
      opacity: 0.18;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 55vw; height: 55vw;
      bottom: -15vw; right: -10vw;
      background: var(--c-b);
      opacity: 0.15;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 35vw; height: 35vw;
      top: 40vh; left: 50vw;
      background: var(--c-a);
      opacity: 0.08;
      animation: drift3 28s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(8vw, 6vh) scale(1.08); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-6vw, -8vh) scale(1.05); } }
    @keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(-5vw, 10vh) scale(0.92); } }

    /* Noise grain */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.45;
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 780px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 36px 0 0;
    }
    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .wordmark-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--c-accent);
      transition: color 1s ease;
    }
    .wordmark-sub {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .time-badge {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--badge-border);
      background: var(--badge-bg);
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
      transition: all 1s ease;
    }

    /* ── Main quote card ── */
    .hero {
      width: 100%;
      max-width: 780px;
      margin-top: 64px;
    }
    .tonight-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 1s ease;
    }
    .tonight-label::before {
      content: '';
      display: block;
      width: 32px; height: 1px;
      background: var(--c-accent);
      transition: background 1s ease;
    }

    .quote-card {
      position: relative;
      border-radius: 24px;
      border: 1px solid var(--c-glass-border);
      background: var(--c-glass-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      padding: 56px 52px 48px;
      overflow: hidden;
      transition: border-color 1s ease, background 1.2s ease;
    }
    .quote-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    /* Liquid glass highlight */
    .quote-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--c-accent), transparent);
      opacity: 0.6;
      transition: background 1s ease;
    }

    .quote-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      line-height: 0.5;
      color: var(--c-accent);
      opacity: 0.2;
      position: absolute;
      top: 28px; left: 40px;
      user-select: none;
      transition: color 1s ease;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.55;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
    }

    .quote-meta {
      margin-top: 36px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .meta-line {
      width: 28px; height: 1px;
      background: var(--c-accent);
      opacity: 0.5;
      transition: background 1s ease;
    }
    .meta-text {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }
    .meta-night {
      font-weight: 500;
      color: var(--c-accent);
      transition: color 1s ease;
    }

    /* ── Section divider ── */
    .section-title {
      width: 100%;
      max-width: 780px;
      margin-top: 72px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .section-title span {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--c-glass-border), transparent);
    }

    /* ── Previous quotes ── */
    .archive {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .archive-item {
      border-radius: 16px;
      border: 1px solid var(--c-glass-border);
      background: var(--c-glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease, transform 0.3s ease, background 1.2s ease;
      cursor: default;
    }
    .archive-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
      pointer-events: none;
    }
    .archive-item:hover {
      border-color: var(--c-glass-border);
      transform: translateY(-2px);
      background: rgba(255,255,255,0.04);
    }

    .archive-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.2vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
      color: var(--text-primary);
      opacity: 0.82;
    }

    .archive-meta {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .archive-night {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--c-accent);
      opacity: 0.7;
      transition: color 1s ease;
    }
    .archive-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .archive-date {
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    /* ── Add quote panel ── */
    .add-section {
      width: 100%;
      max-width: 780px;
      margin-top: 60px;
    }
    .add-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: 1px solid var(--c-glass-border);
      border-radius: 100px;
      padding: 10px 22px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .add-toggle:hover {
      border-color: var(--c-accent);
      color: var(--c-accent);
      background: var(--badge-bg);
    }
    .add-toggle svg { transition: transform 0.3s ease; }
    .add-toggle.open svg { transform: rotate(45deg); }

    .add-form {
      display: none;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }
    .add-form.visible { display: flex; }
    .add-form textarea {
      width: 100%;
      min-height: 110px;
      background: var(--c-glass-bg);
      border: 1px solid var(--c-glass-border);
      border-radius: 16px;
      padding: 20px 24px;
      color: var(--text-primary);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
      font-weight: 300;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      backdrop-filter: blur(20px);
      transition: border-color 0.3s ease;
    }
    .add-form textarea::placeholder { color: var(--text-dim); }
    .add-form textarea:focus { border-color: var(--c-accent); }

    .add-form-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .add-form input {
      flex: 1;
      background: var(--c-glass-bg);
      border: 1px solid var(--c-glass-border);
      border-radius: 100px;
      padding: 10px 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      outline: none;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s ease;
    }
    .add-form input::placeholder { color: var(--text-dim); }
    .add-form input:focus { border-color: var(--c-accent); }

    .submit-btn {
      background: linear-gradient(135deg, var(--c-a), var(--c-b));
      border: none;
      border-radius: 100px;
      padding: 10px 28px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .success-msg {
      display: none;
      font-size: 0.78rem;
      color: var(--c-accent);
      font-style: italic;
      padding: 8px 0;
    }
    .success-msg.visible { display: block; }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: 780px;
      margin-top: 80px;
      padding-top: 32px;
      border-top: 1px solid var(--c-glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .footer-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--c-accent);
      opacity: 0.4;
      transition: background 1s ease;
    }

    /* ── Loading state ── */
    .skeleton {
      background: linear-gradient(90deg, var(--c-glass-bg), rgba(255,255,255,0.04), var(--c-glass-bg));
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .quote-card { padding: 40px 28px 36px; }
      .quote-mark { font-size: 6rem; top: 18px; left: 24px; }
      header { padding: 24px 0 0; }
      .hero { margin-top: 44px; }
      .archive-item { padding: 22px 24px; }
      .add-form-row { flex-direction: column; align-items: stretch; }
    }

    @media (prefers-reduced-motion: reduce) {
      .orb { animation: none; }
      * { transition-duration: 0s !important; }
    }
  </style>
</head>
<body>
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="page">
    <header>
      <div class="wordmark">
        <span class="wordmark-name">Daniel's Quotes</span>
        <span class="wordmark-sub">Nightly Thoughts</span>
      </div>
      <div class="time-badge" id="timeBadge">—</div>
    </header>

    <!-- Current quote -->
    <section class="hero" id="heroSection">
      <div class="tonight-label" id="tonightLabel">Tonight's quote</div>
      <div class="quote-card" id="quoteCard">
        <div class="quote-mark">"</div>
        <p class="quote-text" id="quoteText">
          <span class="skeleton" style="display:block;height:1.6em;width:90%;margin-bottom:12px;"></span>
          <span class="skeleton" style="display:block;height:1.6em;width:75%;"></span>
        </p>
        <div class="quote-meta">
          <div class="meta-line"></div>
          <span class="meta-text">
            Daniel · <span class="meta-night" id="quoteNight">—</span>
          </span>
        </div>
      </div>
    </section>

    <!-- Archive -->
    <div class="section-title">
      <span>Previous nights</span>
    </div>
    <div class="archive" id="archive">
      <!-- populated by JS -->
    </div>

    <!-- Add quote (Daniel's tool) -->
    <div class="add-section">
      <button class="add-toggle" id="addToggle" onclick="toggleAdd()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
        </svg>
        Add tonight's quote
      </button>
      <div class="add-form" id="addForm">
        <textarea id="quoteInput" placeholder="Type tonight's quote…" rows="4"></textarea>
        <div class="add-form-row">
          <input type="text" id="nightInput" placeholder="Label (e.g. Sunday Night)" />
          <button class="submit-btn" onclick="submitQuote()">Send it out</button>
        </div>
        <div class="success-msg" id="successMsg">✦ Quote added. Sweet dreams.</div>
      </div>
    </div>

    <footer>
      <span class="footer-text">Made with care for Daniel's friends</span>
      <div class="footer-dot"></div>
      <span class="footer-text" id="footerTime">—</span>
    </footer>
  </div>

  <script>
    // ── Time-aware theming ──
    function getTimeOfDay() {
      const h = new Date().getHours();
      if (h >= 5 && h < 18) return 'morning';   // 5am–6pm → orange/yellow
      return 'night';                             // 6pm–5am → purple/blue
    }

    function applyTheme() {
      const mode = getTimeOfDay();
      document.body.classList.toggle('morning', mode === 'morning');
    }

    function updateTimeBadge() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      document.getElementById('timeBadge').textContent = `${h12}:${m} ${ampm}`;
      document.getElementById('footerTime').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    applyTheme();
    updateTimeBadge();
    setInterval(() => { applyTheme(); updateTimeBadge(); }, 60 * 1000);

    // ── Format date ──
    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Render quote card ──
    function renderCurrent(quote) {
      if (!quote) return;
      const el = document.getElementById('quoteText');
      el.style.opacity = '0';
      el.style.transform = 'translateY(8px)';
      el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      el.innerHTML = quote.text;
      document.getElementById('quoteNight').textContent = quote.night || 'Tonight';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
      });
    }

    // ── Render archive ──
    function renderArchive(quotes) {
      const el = document.getElementById('archive');
      if (!quotes || quotes.length === 0) {
        el.innerHTML = `<p style="color:var(--text-dim);font-size:0.82rem;font-style:italic;padding:12px 0;">No previous quotes yet.</p>`;
        return;
      }
      el.innerHTML = quotes.map((q, i) => `
        <div class="archive-item" style="animation: fadeUp 0.5s ease ${i * 0.07}s both;">
          <p class="archive-quote">${q.text}</p>
          <div class="archive-meta">
            <span class="archive-night">${q.night || 'Daniel'}</span>
            <div class="archive-dot"></div>
            <span class="archive-date">${formatDate(q.date)}</span>
          </div>
        </div>
      `).join('');
    }

    // Add fadeUp animation dynamically
    const style = document.createElement('style');
    style.textContent = `@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }`;
    document.head.appendChild(style);

    // ── Fetch quotes from API ──
    async function loadQuotes() {
      try {
        const res = await fetch('/api/quotes');
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        renderCurrent(data.current);
        renderArchive(data.previous);
      } catch (err) {
        document.getElementById('quoteText').textContent = 'Could not load tonight\'s quote. Try refreshing.';
        document.getElementById('archive').innerHTML = '';
        console.error('Failed to load quotes:', err);
      }
    }

    loadQuotes();

    // ── Add form toggle ──
    function toggleAdd() {
      const btn = document.getElementById('addToggle');
      const form = document.getElementById('addForm');
      btn.classList.toggle('open');
      form.classList.toggle('visible');
    }

    // ── Submit new quote ──
    async function submitQuote() {
      const text = document.getElementById('quoteInput').value.trim();
      const night = document.getElementById('nightInput').value.trim();
      if (!text) {
        document.getElementById('quoteInput').focus();
        return;
      }
      try {
        const res = await fetch('/api/quotes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, night: night || undefined })
        });
        if (!res.ok) throw new Error('Failed');
        const msg = document.getElementById('successMsg');
        msg.classList.add('visible');
        document.getElementById('quoteInput').value = '';
        document.getElementById('nightInput').value = '';
        setTimeout(() => msg.classList.remove('visible'), 4000);
        loadQuotes();
      } catch {
        alert('Could not save quote. Try again.');
      }
    }
  </script>
</body>
</html>
